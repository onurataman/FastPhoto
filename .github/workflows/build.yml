name: Build FastPhoto APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Rename APK for Production Look
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/FastPhoto.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FastPhoto
        path: app/build/outputs/apk/debug/FastPhoto.apk
