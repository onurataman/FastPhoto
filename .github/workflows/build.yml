name: Build FastPhoto APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Release Keystore
      run: |
        mkdir -p keystore
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/fastphoto-release.jks
        ls -lh keystore/

    - name: Build Release APK
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/keystore/fastphoto-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Rename APK for Production Look
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/FastPhoto.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: FastPhoto
        path: app/build/outputs/apk/release/FastPhoto.apk

    - name: Delete previous 'latest' release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: gh release delete latest --yes --cleanup-tag || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish 'latest' release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Auto-generated latest release build from main.
          Properly signed release APK (~10MB, no debug-key warnings).
          Direct download: https://github.com/onurataman/FastPhoto/releases/latest/download/FastPhoto.apk
        files: app/build/outputs/apk/release/FastPhoto.apk
        make_latest: true
        prerelease: false
